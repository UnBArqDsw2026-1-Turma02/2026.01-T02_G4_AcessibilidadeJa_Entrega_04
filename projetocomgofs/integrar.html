<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Integrar – AcessibilidadeJá</title>
    <meta
      name="description"
      content="Adicione o widget ao seu site."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <div id="site-header"></div>

      <main class="content">
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Voltar
        </a>

        <h1 class="page-title">Integre em 30 segundos</h1>
        <p class="page-lead">
          Cole uma única linha no seu HTML e pronto. Funciona em qualquer site — WordPress, React,
          Vue, HTML estático, qualquer um.
        </p>

        <section class="step">
          <div class="step__head">
            <span class="step__num">1</span>
            <h2>HTML / qualquer site</h2>
          </div>
          <div class="code-block" data-copy>
            <pre><code id="snippet-html"></code></pre>
            <button type="button" class="code-block__copy" aria-label="Copiar código">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
              </svg>
            </button>
          </div>
          <p class="step__note">Cole antes do <code>&lt;/body&gt;</code>.</p>
        </section>

        <section class="step">
          <div class="step__head">
            <span class="step__num">2</span>
            <h2>Configuração opcional</h2>
          </div>
          <div class="code-block" data-copy>
            <pre><code id="snippet-config"></code></pre>
            <button type="button" class="code-block__copy" aria-label="Copiar código">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
              </svg>
            </button>
          </div>
        </section>

      </main>
    </div>

    <script type="module" src="js/site.js"></script>
  </body>
</html>
