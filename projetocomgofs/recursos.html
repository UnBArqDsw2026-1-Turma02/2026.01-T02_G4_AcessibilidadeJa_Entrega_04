<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recursos – AcessibilidadeJá</title>
    <meta
      name="description"
      content="Contraste, zoom, modo leitura, dislexia, tradutor, ajuste de cursor e mais. Tudo em um único widget."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <div id="site-header"></div>

      <main class="content content--wide">
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 12H5M12 19l-7-7 7-7" />

        </a>

        <h1 class="page-title">
          Conheça nossos recursos<br />
          <span>de acessibilidade</span>
        </h1>

        <div class="recursos-intro">
          <div class="recursos-grid">
            <p class="recursos-section-label">
              <span class="feature-row__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>

            </p>
            <div class="recursos-grid__spacer" aria-hidden="true"></div>

            <div class="feature-row">
              <span class="feature-row__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="12" r="4" />
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2" />

                Contraste claro
              </button>
            </div>

            <div class="feature-row">
              <span class="feature-row__icon" aria-hidden="true">

                  <path d="M21 12a9 9 0 11-3-6.7M21 3v6h-6" />

              </button>
            </div>

            <div class="feature-row">
              <span class="feature-row__icon" aria-hidden="true">

              <span class="feature-row__icon" aria-hidden="true">

                  <path d="M3 12h18M3 7h18M3 17h12" />
                </svg>
              </span>
              <button type="button" class="feature-btn" data-open-widget>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z" /></svg>
                Guia de leitura
              </button>
            </div>
          </div>

    <script src="js/site.js"></script>
